<title>ZATA AR Shooter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
#canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}

/* Logo esquina */
.zata-corner{position:fixed;top:calc(var(--safe-top)+10px);left:14px;z-index:11;pointer-events:none;display:flex;align-items:center;gap:7px;}
.zata-corner img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(74,222,128,0.4));}
.zata-corner span{font-size:13px;font-weight:900;letter-spacing:0.2em;color:#4ade80;text-shadow:0 0 8px rgba(74,222,128,0.5);}

/* HUD stats — derecha */
.hud{position:fixed;top:calc(var(--safe-top)+8px);right:14px;display:flex;flex-direction:column;gap:6px;pointer-events:none;z-index:10;}
.hud-box{background:rgba(0,0,0,0.58);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:10px;padding:6px 12px;display:flex;flex-direction:column;gap:1px;align-items:flex-end;}
.hud-label{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;}
.hud-val{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;line-height:1;}
.hud-val.accent{color:#4ade80;}

/* Mic controls — abajo izquierda */
/* mic bar removed */
.sens-wrap{position:fixed;bottom:calc(var(--safe-bottom)+16px);left:0;right:0;display:flex;justify-content:center;align-items:center;gap:12px;z-index:10;pointer-events:all;}
.sens-label{font-size:11px;color:rgba(255,255,255,0.45);}
input[type=range].sens-slider{-webkit-appearance:none;width:140px;height:3px;border-radius:2px;background:rgba(255,255,255,0.15);outline:none;}
input[type=range].sens-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#4ade80;border:2px solid #000;}
#sensReadout{font-size:11px;color:rgba(255,255,255,0.45);min-width:24px;}

/* Giroscopio badge */
.gyro-badge{position:fixed;bottom:calc(var(--safe-bottom)+16px);right:14px;z-index:10;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 9px;font-size:10px;color:rgba(255,255,255,0.35);backdrop-filter:blur(8px);}
.gyro-badge.on{color:#4ade80;border-color:rgba(74,222,128,0.3);}

/* Flash */
#flash{position:fixed;inset:0;background:rgba(255,255,255,0.28);pointer-events:none;opacity:0;z-index:15;transition:opacity 0.07s;}
#hitMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-200%);font-size:26px;font-weight:800;color:#fbbf24;text-shadow:0 2px 14px rgba(0,0,0,0.8);pointer-events:none;opacity:0;z-index:16;}

/* Start screen */
#startScreen{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;}
.start-logo{display:flex;flex-direction:column;align-items:center;gap:8px;}
.start-logo img{width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(74,222,128,0.6));}
.start-brand{font-size:26px;font-weight:900;letter-spacing:0.22em;color:#4ade80;text-shadow:0 0 16px rgba(74,222,128,0.5);}
.start-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:0.08em;}
.start-sub{font-size:12px;color:rgba(255,255,255,0.42);text-align:center;max-width:270px;line-height:1.65;}
.btn-start{margin-top:6px;padding:13px 38px;background:#4ade80;color:#000;border:none;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:0.04em;box-shadow:0 0 22px rgba(74,222,128,0.4);}
.btn-start:active{transform:scale(0.96);}
</style>
</head>

// ── Refs ────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),
  video=document.getElementById('video'),flash=document.getElementById('flash'),
  hitMsg=document.getElementById('hitMsg'),scoreEl=document.getElementById('score'),
  killsEl=document.getElementById('kills'),
  gyroBadge=document.getElementById('gyroBadge');

let W=0,H=0,targets=[],particles=[],bullets=[],bulletHoles=[],muzzleFlashes=[],
  score=0,kills=0,animId=null,audioCtx=null,analyser=null,micData=null,lastShotTime=0;
const SHOT_COOLDOWN=650, MAX_TARGETS=5;
const TARGET_TYPES=['bullseye','can','balloon','silhouette'];

// ── Sensibilidad mic con botones ────────────────────────────────
let micSens=50;
const sensSliderEl=document.getElementById('sensSlider');
const sensReadoutEl=document.getElementById('sensReadout');
sensSliderEl.oninput=()=>{micSens=parseInt(sensSliderEl.value);sensReadoutEl.textContent=micSens;};

// ── Giroscopio ──────────────────────────────────────────────────
// Los targets viven en un "mundo virtual" más grande que la pantalla.
// El giroscopio desplaza la cámara virtual sobre ese mundo.
const WORLD_W=W*3, WORLD_H=H*3; // se recalcula en resize
let camX=0,camY=0;          // posición de la cámara en el mundo
let gyroAlpha=0,gyroBeta=0; // ángulos actuales del giroscopio
let gyroBaseAlpha=null,gyroBaseBeta=null; // posición de referencia al inicio
let gyroActive=false;
const GYRO_SCALE=4.5;        // píxeles de desplazamiento por grado

function initGyro(){
  if(!window.DeviceOrientationEvent){gyroBadge.textContent='NO GYRO';return;}

  // iOS 13+ requiere permiso explícito
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==='granted')startGyro();
      else gyroBadge.textContent='GYRO NEGADO';
    }).catch(()=>gyroBadge.textContent='GYRO ERR');
  } else {
    startGyro();
  }
}

function startGyro(){
  window.addEventListener('deviceorientation',e=>{
    if(!e.alpha&&!e.beta&&!e.gamma)return;
    if(gyroBaseAlpha===null){
      gyroBaseAlpha=e.alpha||0;
      gyroBaseBeta=e.beta||0;
    }
    // Delta desde posición de referencia
    let da=e.alpha-gyroBaseAlpha;
    // Normalizar delta a -180..180
    if(da>180)da-=360;if(da<-180)da+=360;
    const db=(e.beta||0)-gyroBaseBeta;
    camX=da*GYRO_SCALE;
    camY=db*GYRO_SCALE;
    if(!gyroActive){gyroActive=true;gyroBadge.textContent='GYRO ON';gyroBadge.className='gyro-badge on';}
  });
}

// ── Resize ──────────────────────────────────────────────────────
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ── Spawn target en el mundo virtual ───────────────────────────
function randomTarget(){
  const margin=100,type=TARGET_TYPES[Math.floor(Math.random()*TARGET_TYPES.length)];
  const size=type==='silhouette'?58+Math.random()*28:type==='balloon'?36+Math.random()*22:type==='can'?28+Math.random()*18:42+Math.random()*26;
  // Posición en espacio de pantalla expandido (el giroscopio puede mover hasta ~±300px)
  const spread=280;
  return{
    type,
    worldX:(Math.random()-0.5)*spread*2 + (Math.random()-0.5)*W*0.6,
    worldY:-80+Math.random()*(H*0.55),
    size,born:Date.now(),
    bobOffset:Math.random()*Math.PI*2,
    bobSpeed:0.35+Math.random()*0.5,
    bobAmp:5+Math.random()*8,
    swayAmp:3+Math.random()*5,
    opacity:0,dying:false,dyingT:0,
    points:type==='silhouette'?30:type==='can'?20:type==='balloon'?15:10
  };
}
function spawnTarget(){targets.push(randomTarget());}

// Convierte worldX/Y → screenX/Y según posición de cámara
function toScreen(wx,wy){
  return{sx:W/2+wx-camX, sy:H/2+wy-camY};
}

// ── Helpers color ───────────────────────────────────────────────
function lighten(hex,amt){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,((n>>16)&0xff)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;}
function darken(hex,amt){if(!hex.startsWith('#'))return hex;const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.max(0,((n>>16)&0xff)-amt)},${Math.max(0,((n>>8)&0xff)-amt)},${Math.max(0,(n&0xff)-amt)})`;}

// ── Dibujo targets ──────────────────────────────────────────────
function drawBullseye(t,x,y,alpha){
  const r=t.size;
  ctx.save();ctx.globalAlpha=alpha;
  // Sombra suelo
  ctx.beginPath();ctx.ellipse(x+5,y+r*0.18,r*0.85,r*0.16,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();
  const rings=['#c1121f','#f5f5f5','#c1121f','#f5f5f5','#023e8a'];
  for(let i=rings.length-1;i>=0;i--){
    const rr=r*((i+1)/rings.length);
    const g=ctx.createRadialGradient(x-rr*0.35,y-rr*0.35,rr*0.05,x,y,rr);
    g.addColorStop(0,lighten(rings[i],60));g.addColorStop(0.6,rings[i]);g.addColorStop(1,darken(rings[i],40));
    ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=0.8;ctx.stroke();
  }
  const sh=ctx.createRadialGradient(x-r*0.28,y-r*0.3,0,x-r*0.1,y-r*0.1,r*0.6);
  sh.addColorStop(0,'rgba(255,255,255,0.22)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=sh;ctx.fill();

}

function drawBalloon(t,x,y,alpha){
  const r=t.size;
  const colors=['#e63946','#f4a261','#2a9d8f','#e9c46a','#7209b7'];
  const color=colors[Math.floor(t.born/1200)%colors.length];

  ctx.beginPath();ctx.ellipse(x+8,y+r+8,r*0.45,r*0.1,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();

  g.addColorStop(0,lighten(color,70));g.addColorStop(0.5,color);g.addColorStop(1,darken(color,50));
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=darken(color,30);ctx.lineWidth=1.2;ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.beginPath();

// ── Silueta 3D realista ─────────────────────────────────────────
function drawSilhouette(t,x,y,alpha){
  const s=t.size;
  ctx.save();ctx.globalAlpha=alpha;

  // Sombra suelo
  ctx.beginPath();ctx.ellipse(x+4,y+s*0.6,s*0.22,s*0.07,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();

  // ── Piernas ──
  // Pierna derecha (más oscura, "atrás")
  const legGradR=ctx.createLinearGradient(x,0,x+s*0.22,0);
  legGradR.addColorStop(0,'#1a2a3a');legGradR.addColorStop(0.5,'#2a3f55');legGradR.addColorStop(1,'#111');
  ctx.fillStyle=legGradR;
  ctx.beginPath();
  ctx.moveTo(x+s*0.04,y+s*0.1);ctx.lineTo(x+s*0.2,y+s*0.1);
  ctx.lineTo(x+s*0.22,y+s*0.6);ctx.lineTo(x+s*0.06,y+s*0.6);ctx.closePath();ctx.fill();
  // Pierna izquierda (frente)
  const legGradL=ctx.createLinearGradient(x-s*0.22,0,x,0);
  legGradL.addColorStop(0,'#111');legGradL.addColorStop(0.4,'#263d52');legGradL.addColorStop(1,'#1a2a3a');
  ctx.fillStyle=legGradL;
  ctx.beginPath();
  ctx.moveTo(x-s*0.2,y+s*0.1);ctx.lineTo(x-s*0.04,y+s*0.1);
  ctx.lineTo(x-s*0.06,y+s*0.6);ctx.lineTo(x-s*0.22,y+s*0.6);ctx.closePath();ctx.fill();
  // Separador piernas
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y+s*0.1);ctx.lineTo(x,y+s*0.6);ctx.stroke();

  // ── Botas ──
  const bootColor='#0f1923';
  ctx.fillStyle=bootColor;
  ctx.beginPath();ctx.roundRect(x-s*0.24,y+s*0.55,s*0.19,s*0.1,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+s*0.04,y+s*0.55,s*0.19,s*0.1,3);ctx.fill();

  // ── Torso ──
  const torsoG=ctx.createLinearGradient(x-s*0.26,0,x+s*0.26,0);
  torsoG.addColorStop(0,'#0d1b2a');torsoG.addColorStop(0.25,'#1b3a52');torsoG.addColorStop(0.5,'#22496a');
  torsoG.addColorStop(0.75,'#1b3a52');torsoG.addColorStop(1,'#0d1b2a');
  ctx.fillStyle=torsoG;
  ctx.beginPath();
  ctx.moveTo(x-s*0.26,y-s*0.52);ctx.lineTo(x+s*0.26,y-s*0.52);
  ctx.lineTo(x+s*0.22,y+s*0.12);ctx.lineTo(x-s*0.22,y+s*0.12);ctx.closePath();ctx.fill();
  // Línea central chaleco
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y-s*0.5);ctx.lineTo(x,y+s*0.1);ctx.stroke();
  // Bolsillos tácticos
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.roundRect(x-s*0.22,y-s*0.28,s*0.14,s*0.16,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+s*0.08,y-s*0.28,s*0.14,s*0.16,2);ctx.fill();
  // Brillo lateral torso
  const torsoShine=ctx.createLinearGradient(x-s*0.26,0,x+s*0.26,0);
  torsoShine.addColorStop(0,'rgba(255,255,255,0)');torsoShine.addColorStop(0.3,'rgba(255,255,255,0.08)');torsoShine.addColorStop(0.5,'rgba(255,255,255,0.12)');torsoShine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=torsoShine;
  ctx.beginPath();ctx.moveTo(x-s*0.26,y-s*0.52);ctx.lineTo(x+s*0.26,y-s*0.52);ctx.lineTo(x+s*0.22,y+s*0.12);ctx.lineTo(x-s*0.22,y+s*0.12);ctx.closePath();ctx.fill();

  // ── Brazos ──
  // Brazo derecho
  const armRG=ctx.createLinearGradient(x+s*0.22,y-s*0.45,x+s*0.48,y-s*0.08,);
  armRG.addColorStop(0,'#1b3a52');armRG.addColorStop(1,'#0d1b2a');
  ctx.fillStyle=armRG;
  ctx.beginPath();ctx.moveTo(x+s*0.22,y-s*0.48);ctx.lineTo(x+s*0.3,y-s*0.48);
  ctx.lineTo(x+s*0.52,y-s*0.06);ctx.lineTo(x+s*0.44,y-s*0.06);ctx.closePath();ctx.fill();
  // Brazo izquierdo
  const armLG=ctx.createLinearGradient(x-s*0.48,y-s*0.08,x-s*0.22,y-s*0.45);
  armLG.addColorStop(0,'#0d1b2a');armLG.addColorStop(1,'#1b3a52');
  ctx.fillStyle=armLG;
  ctx.beginPath();ctx.moveTo(x-s*0.3,y-s*0.48);ctx.lineTo(x-s*0.22,y-s*0.48);
  ctx.lineTo(x-s*0.44,y-s*0.06);ctx.lineTo(x-s*0.52,y-s*0.06);ctx.closePath();ctx.fill();
  // Manos
  ctx.fillStyle='#c49a6c';
  ctx.beginPath();ctx.arc(x+s*0.48,y-s*0.04,s*0.07,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-s*0.48,y-s*0.04,s*0.07,0,Math.PI*2);ctx.fill();

  // ── Cuello ──
  const neckG=ctx.createLinearGradient(x-s*0.07,0,x+s*0.07,0);
  neckG.addColorStop(0,'#8a6a50');neckG.addColorStop(0.5,'#c49a6c');neckG.addColorStop(1,'#8a6a50');
  ctx.fillStyle=neckG;
  ctx.beginPath();ctx.roundRect(x-s*0.07,y-s*0.62,s*0.14,s*0.12,3);ctx.fill();

  // ── Cabeza ──
  const headG=ctx.createRadialGradient(x-s*0.08,y-s*0.82,0,x,y-s*0.76,s*0.26);
  headG.addColorStop(0,'#d4a97a');headG.addColorStop(0.6,'#c49a6c');headG.addColorStop(1,'#8a6a50');
  ctx.fillStyle=headG;
  ctx.beginPath();
  ctx.ellipse(x,y-s*0.78,s*0.18,s*0.22,0,0,Math.PI*2);ctx.fill();
  // Rasgos faciales simples
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.ellipse(x-s*0.07,y-s*0.82,s*0.04,s*0.025,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+s*0.07,y-s*0.82,s*0.04,s*0.025,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x,y-s*0.72,s*0.06,0,Math.PI);ctx.stroke();

  // ── Casco táctico ──
  const helmetG=ctx.createRadialGradient(x-s*0.06,y-s*0.96,0,x,y-s*0.88,s*0.24);
  helmetG.addColorStop(0,'#3a4a3a');helmetG.addColorStop(0.6,'#2a3a2a');helmetG.addColorStop(1,'#1a2a1a');
  ctx.fillStyle=helmetG;
  ctx.beginPath();ctx.ellipse(x,y-s*0.88,s*0.21,s*0.17,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.rect(x-s*0.22,y-s*0.88,s*0.44,s*0.06);ctx.fill();
  // Brillo casco
  const helmSh=ctx.createLinearGradient(x-s*0.18,y-s*1.0,x+s*0.05,y-s*0.9);
  helmSh.addColorStop(0,'rgba(255,255,255,0.14)');helmSh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=helmSh;
  ctx.beginPath();ctx.ellipse(x,y-s*0.88,s*0.21,s*0.17,0,Math.PI,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawTarget(t){
  const now=Date.now(),age=(now-t.born)/1000;
  if(!t.dying)t.opacity=Math.min(1,age*3);
  const bob=Math.sin(now*0.001*t.bobSpeed+t.bobOffset)*t.bobAmp;
  const sway=Math.sin(now*0.0007*t.bobSpeed+t.bobOffset)*t.swayAmp;
  const {sx,sy}=toScreen(t.worldX+sway,t.worldY+bob);
  let alpha=t.opacity;
  if(t.dying)alpha=Math.max(0,1-(now-t.dyingT)/380);
  if(alpha<=0)return;
  if(t.type==='bullseye')drawBullseye(t,sx,sy,alpha);
  else if(t.type==='can')drawCan(t,sx,sy,alpha);
  else if(t.type==='balloon')drawBalloon(t,sx,sy,alpha);
  else drawSilhouette(t,sx,sy,alpha);
}

// ── Mira ────────────────────────────────────────────────────────
function drawCrosshair(){

  ctx.strokeStyle='rgba(0,0,0,0.45)';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.92)';ctx.lineWidth=1.8;ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=5;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  const arms=[[cx-r-gap-arm,cy,cx-r-gap,cy],[cx+r+gap,cy,cx+r+gap+arm,cy],[cx,cy-r-gap-arm,cx,cy-r-gap],[cx,cy+r+gap,cx,cy+r+gap+arm]];
  ctx.strokeStyle='rgba(0,0,0,0.45)';ctx.lineWidth=3.5;
  arms.forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});

  arms.forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});

// ── Bullet holes ────────────────────────────────────────────────
function spawnBulletHole(wx,wy){
  bulletHoles.push({wx,wy,born:Date.now(),r:6+Math.random()*4,cracks:genCracks(wx,wy)});
}
function genCracks(cx,cy){
  const cracks=[];
  for(let i=0;i<6+Math.floor(Math.random()*4);i++){
    const a=Math.random()*Math.PI*2,len=14+Math.random()*22,segs=[];
    let px=cx,py=cy,ang=a;
    for(let s=0;s<3;s++){ang+=(Math.random()-0.5)*0.5;const sl=len*(0.4+Math.random()*0.3);segs.push({x:px+Math.cos(ang)*sl,y:py+Math.sin(ang)*sl});px=segs[segs.length-1].x;py=segs[segs.length-1].y;}
    cracks.push(segs);
  }
  return cracks;
}
function drawBulletHoles(){
  const now=Date.now();
  bulletHoles=bulletHoles.filter(h=>(now-h.born)<9000);
  bulletHoles.forEach(h=>{
    // Convertir posición mundo → pantalla
    const {sx,sy}=toScreen(h.wx,h.wy);
    const offsetX=sx-h.wx, offsetY=sy-h.wy; // delta para cracks
    const age=(now-h.born)/9000,alpha=Math.max(0,1-age);
    ctx.save();ctx.globalAlpha=alpha;
    const halo=ctx.createRadialGradient(sx,sy,h.r,sx,sy,h.r*3.5);
    halo.addColorStop(0,'rgba(0,0,0,0.45)');halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(sx,sy,h.r*3.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=1.2;ctx.lineCap='round';
    h.cracks.forEach(segs=>{
      ctx.beginPath();ctx.moveTo(sx,sy);
      segs.forEach(s=>ctx.lineTo(s.x+offsetX,s.y+offsetY));ctx.stroke();
    });
    const og=ctx.createRadialGradient(sx-h.r*0.3,sy-h.r*0.3,0,sx,sy,h.r);
    og.addColorStop(0,'#555');og.addColorStop(1,'#1a1a1a');
    ctx.fillStyle=og;ctx.beginPath();ctx.arc(sx,sy,h.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sx,sy,h.r*0.52,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.13)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(sx-h.r*0.2,sy-h.r*0.2,h.r,Math.PI*0.8,Math.PI*1.6);ctx.stroke();
    ctx.restore();
  });
}

// ── Partículas ──────────────────────────────────────────────────
function spawnParticles(sx,sy,type){
  const dustC='rgba(180,160,120,';
  for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;particles.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,decay:0.025+Math.random()*0.03,r:2+Math.random()*4,type:'dust',color:dustC});}
  const fc=type==='balloon'?['#f4a261','#e9c46a','rgba(255,255,255,']:type==='can'?['#e63946','#c0392b','rgba(210,210,210,']:type==='bullseye'?['#e63946','#023e8a','rgba(245,245,245,']:['#22496a','rgba(239,68,68,','rgba(255,255,255,'];
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*7;particles.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,decay:0.018+Math.random()*0.025,r:3+Math.random()*6,type:'frag',color:fc[Math.floor(Math.random()*fc.length)]});}
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,sp=5+Math.random()*10;particles.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:0.06+Math.random()*0.06,r:1.5+Math.random()*2,type:'spark',color:'rgba(255,220,80,'});}
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.type==='spark'?0.08:0.22;p.vx*=0.96;p.life-=p.decay;
    const a=Math.max(0,p.life);ctx.globalAlpha=a;
    if(p.type==='spark'){ctx.shadowColor='#ffd700';ctx.shadowBlur=6;ctx.fillStyle=`${p.color}${a})`;}
    else{ctx.shadowBlur=0;ctx.fillStyle=p.color.includes('rgba')?`${p.color}${a*0.8})`:p.color;}
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

// ── Bala ────────────────────────────────────────────────────────
function spawnBullet(tx,ty,worldX,worldY){bullets.push({x:W/2,y:H/2,tx,ty,worldX,worldY,progress:0,speed:0.1});}
function updateBullets(){
  const toHit=[];
  bullets=bullets.filter(b=>b.progress<1);
  bullets.forEach(b=>{
    b.progress=Math.min(1,b.progress+b.speed);
    const x=W/2+(b.tx-W/2)*b.progress,y=H/2+(b.ty-H/2)*b.progress;
    ctx.save();
    const tr=ctx.createRadialGradient(x,y,0,x,y,5);
    tr.addColorStop(0,'rgba(255,230,100,0.9)');tr.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle=tr;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    ctx.shadowColor='#ffd700';ctx.shadowBlur=10;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();ctx.restore();
    if(b.progress>=1)toHit.push(b);
  });
  toHit.forEach(b=>spawnBulletHole(b.worldX,b.worldY));
}

// ── Muzzle flash ────────────────────────────────────────────────
function spawnMuzzleFlash(){muzzleFlashes.push({born:Date.now()});}
function drawMuzzleFlash(){
  const now=Date.now();muzzleFlashes=muzzleFlashes.filter(f=>(now-f.born)<130);
  muzzleFlashes.forEach(f=>{
    const age=(now-f.born)/130,alpha=1-age,r=20*(1-age*0.5);
    ctx.save();ctx.globalAlpha=alpha;
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
    g.addColorStop(0,'rgba(255,255,200,1)');g.addColorStop(0.4,'rgba(255,160,50,0.8)');g.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

// ── Hit detection ───────────────────────────────────────────────
function getTargetAtCenter(){
  let best=null,bestDist=Infinity;
  targets.forEach(t=>{
    if(t.dying)return;
    const bob=Math.sin(Date.now()*0.001*t.bobSpeed+t.bobOffset)*t.bobAmp;
    const sway=Math.sin(Date.now()*0.0007*t.bobSpeed+t.bobOffset)*t.swayAmp;
    const {sx,sy}=toScreen(t.worldX+sway,t.worldY+bob);
    const dist=Math.hypot(W/2-sx,H/2-sy);
    if(dist<t.size*1.3&&dist<bestDist){best=t;bestDist=dist;}
  });
  return best;
}

function shoot(){
  const now=Date.now();if(now-lastShotTime<SHOT_COOLDOWN)return;
  lastShotTime=now;
  flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',70);
  spawnMuzzleFlash();
  const hit=getTargetAtCenter();
  if(hit){
    const {sx,sy}=toScreen(hit.worldX,hit.worldY);
    spawnBullet(sx,sy,hit.worldX,hit.worldY);
    setTimeout(()=>killTarget(hit),130);
  } else {
    const mx=W/2+(Math.random()-0.5)*60,my=H/2+(Math.random()-0.5)*60;
    // Convertir screen miss → world
    spawnBullet(mx,my,mx-W/2+camX,my-H/2+camY);
  }
}

function killTarget(t){
  if(t.dying)return;t.dying=true;t.dyingT=Date.now();
  const bob=Math.sin(Date.now()*0.001*t.bobSpeed+t.bobOffset)*t.bobAmp;
  const sway=Math.sin(Date.now()*0.0007*t.bobSpeed+t.bobOffset)*t.swayAmp;
  const {sx,sy}=toScreen(t.worldX+sway,t.worldY+bob);
  spawnParticles(sx,sy,t.type);
  score+=t.points;kills++;scoreEl.textContent=score;killsEl.textContent=kills;
  showHit(`+${t.points}`);
  setTimeout(()=>{targets=targets.filter(x=>x!==t);spawnTarget();},500);
}

function showHit(text){
  hitMsg.textContent=text;hitMsg.style.opacity='1';hitMsg.style.transform='translate(-50%,-200%)';hitMsg.style.transition='none';
  requestAnimationFrame(()=>{hitMsg.style.transition='transform 0.4s ease-out,opacity 0.4s ease-out 0.3s';hitMsg.style.transform='translate(-50%,-260%)';setTimeout(()=>hitMsg.style.opacity='0',300);});
}

// ── Micrófono ───────────────────────────────────────────────────
async function initMic(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  const source=audioCtx.createMediaStreamSource(stream);
  analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.4;
  source.connect(analyser);micData=new Uint8Array(analyser.frequencyBinCount);
}
function checkMic(){
  if(!analyser)return;
  analyser.getByteFrequencyData(micData);
  const avg=micData.reduce((a,b)=>a+b,0)/micData.length;
  const peak=Math.max(...micData);
  // mic bar removed
  const threshold=230-(micSens*1.44);
  if(peak>threshold)shoot();
}

// ── Loop ────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  drawBulletHoles();
  targets.forEach(drawTarget);
  updateBullets();
  updateParticles();
  drawMuzzleFlash();
  drawCrosshair();
  checkMic();
  animId=requestAnimationFrame(loop);
}

// ── Inicio ──────────────────────────────────────────────────────
document.getElementById('btnStart').onclick=async()=>{
  document.getElementById('startScreen').style.display='none';
  try{
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}});}
    catch{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}
    video.srcObject=stream;
    await initMic();
    initGyro();
    for(let i=0;i<MAX_TARGETS;i++)setTimeout(()=>spawnTarget(),i*320);
    loop();
  }catch(e){
    alert('Necesita permiso de cámara y micrófono.');
    document.getElementById('startScreen').style.display='flex';
  }
};
